<!DOCTYPE html>
<html lang="en">
<head>
    <title>Flag Viewer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #f5f2eb;
            --surface: #ffffff;
            --border: #e0dbd0;
            --ink: #1a1814;
            --ink-muted: #8a8478;
            --accent: #c4392d;
            --accent-light: #f5ebe9;
            --shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        body {
            font-family: 'DM Mono', monospace;
            background: var(--bg);
            color: var(--ink);
            height: 100vh;
            display: grid;
            grid-template-columns: 1fr 320px;
            overflow: hidden;
        }

        /* ── LEFT PANEL ── */
        #left {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            gap: 32px;
            position: relative;
        }

        #left::after {
            content: '';
            position: absolute;
            top: 0; right: 0;
            width: 1px;
            height: 100%;
            background: var(--border);
        }

        .header {
            text-align: center;
        }


        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            line-height: 1;
        }

        .header p {
            font-size: 0.7rem;
            color: var(--ink-muted);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-top: 6px;
        }

        /* flag stage */
        .flag-stage {
            position: relative;
            width: 380px;
        }

        .flag-frame {
            background: #e8e6e0;
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 24px;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 220px;
            position: relative;
            overflow: hidden;
        }

        /* decorative corner marks */
        .flag-frame::before,
        .flag-frame::after {
            content: '';
            position: absolute;
            width: 12px; height: 12px;
            border-color: var(--accent);
            border-style: solid;
        }
        .flag-frame::before { top: 8px; left: 8px; border-width: 1px 0 0 1px; }
        .flag-frame::after  { bottom: 8px; right: 8px; border-width: 0 1px 1px 0; }

        #flag {
            max-width: 100%;
            max-height: 180px;
            display: block;
            object-fit: contain;
            opacity: 0;
            transition: opacity 0.25s ease;
        }

        #flag.loaded { opacity: 1; }

        #flag-code {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.6rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--ink-muted);
            background: var(--bg);
            padding: 2px 8px;
            border-radius: 2px;
        }

        /* controls */
        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .btn {
            font-family: 'DM Mono', monospace;
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--ink);
            padding: 10px 20px;
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .btn:hover {
            border-color: var(--ink);
            background: var(--ink);
            color: var(--surface);
        }

        .btn.primary {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .btn.primary:hover {
            background: #a82e24;
            border-color: #a82e24;
        }

        .btn:active { transform: translateY(1px); }

        .btn-nav {
            padding: 10px 14px;
            font-size: 1rem;
            letter-spacing: 0;
        }

        /* toast */
        #toast {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%) translateY(60px);
            background: var(--ink);
            color: white;
            font-size: 0.65rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 8px 18px;
            border-radius: 3px;
            transition: transform 0.25s ease;
            pointer-events: none;
        }

        #toast.show { transform: translateX(-50%) translateY(0); }

        /* ── RIGHT PANEL ── */
        #right {
            background: var(--surface);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .saved-header {
            padding: 24px 20px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: baseline;
            justify-content: space-between;
        }

        .saved-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            font-weight: 700;
        }

        #saved-count {
            font-size: 0.65rem;
            color: var(--ink-muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        #savedFlags {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            align-content: start;
        }

        #savedFlags::-webkit-scrollbar { width: 4px; }
        #savedFlags::-webkit-scrollbar-track { background: transparent; }
        #savedFlags::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        .saved-flag-card {
            background: #d0cfc9;
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.96); }
            to   { opacity: 1; transform: scale(1); }
        }

        .saved-flag-card img {
            width: 100%;
            height: 60px;
            object-fit: contain;
            display: block;
        }

        .saved-flag-card span {
            font-size: 0.6rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--ink-muted);
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px 20px;
            color: var(--ink-muted);
            font-size: 0.7rem;
            letter-spacing: 0.08em;
            line-height: 1.8;
        }
    </style>
</head>
<body>

    <div id="left">
        <div class="header">
            <h1>Flag Viewer</h1>
            <p>World Flags Collection</p>
        </div>

        <div class="flag-stage">
            <div class="flag-frame">
                <img id="flag" src="" alt="Country flag">
                <span id="flag-code"></span>
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-nav" onclick="prevFlag()" title="Previous">←</button>
            <button class="btn primary" onclick="saveFlag()">Save Flag</button>
            <button class="btn btn-nav" onclick="nextFlag()" title="Next">→</button>
        </div>
    </div>

    <div id="right">
        <div class="saved-header">
            <h2>Saved</h2>
            <span id="saved-count">0 flags</span>
        </div>
        <div id="savedFlags"></div>
    </div>

    <div id="toast">Saved</div>

    <script>
        let currentIndex = 0;
        let currentCode = "";

        function updateFlag(index) {
            const img = document.getElementById("flag");
            img.classList.remove("loaded");

            fetch(`/get_flag/${index}`)
                .then(res => res.json())
                .then(data => {
                    img.onload = () => img.classList.add("loaded");
                    img.src = data.url;
                    currentIndex = data.index;
                    currentCode = data.code;
                    document.getElementById("flag-code").textContent = data.code;
                });
        }

        function nextFlag() { updateFlag(currentIndex + 1); }
        function prevFlag() { updateFlag(currentIndex - 1); }

        function saveFlag() {
            fetch("/save_flag", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    code: currentCode,
                    url: document.getElementById("flag").src
                })
            })
            .then(res => res.json())
            .then(data => {
                if (data.message === "already_saved") {
                    showToast("Already saved!");
                } else {
                    loadSavedFlags();
                    showToast("Flag saved");
                }
            });
        }

        function showToast(msg) {
            const toast = document.getElementById("toast");
            toast.textContent = msg;
            toast.classList.add("show");
            setTimeout(() => toast.classList.remove("show"), 1800);
        }

        function loadSavedFlags() {
            fetch("/get_saved_flags")
                .then(res => res.json())
                .then(data => {
                    const container = document.getElementById("savedFlags");
                    const count = document.getElementById("saved-count");

                    count.textContent = `${data.length} flag${data.length !== 1 ? 's' : ''}`;

                    if (data.length === 0) {
                        container.innerHTML = '<div class="empty-state">No flags saved yet.<br>Browse and save flags<br>to collect them here.</div>';
                        return;
                    }

                    container.innerHTML = "";
                    data.forEach(flag => {
                        const card = document.createElement("div");
                        card.className = "saved-flag-card";

                        const img = document.createElement("img");
                        img.src = flag.url;
                        img.alt = flag.code;

                        const label = document.createElement("span");
                        label.textContent = flag.code;

                        const deleteBtn = document.createElement("button");
                        deleteBtn.textContent = "✕";
                        deleteBtn.className = "btn";
                        deleteBtn.style.cssText = "font-size:0.6rem; padding:3px 8px; margin-top:2px;";
                        deleteBtn.onclick = () => {
                            fetch("/delete_flag", {
                                method: "DELETE",
                                headers: { "Content-Type": "application/json" },
                                body: JSON.stringify({ code: flag.code })
                            }).then(() => loadSavedFlags());
                        };

                        card.appendChild(img);
                        card.appendChild(label);
                        card.appendChild(deleteBtn);
                        container.appendChild(card);
                    });;
                });
        }

        document.addEventListener("keydown", e => {
            if (e.key === "ArrowRight") nextFlag();
            if (e.key === "ArrowLeft")  prevFlag();
            if (e.key === "s" || e.key === "S") saveFlag();
        });

        updateFlag(0);
        loadSavedFlags();
    </script>

</body>
</html>
